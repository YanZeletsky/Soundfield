<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Обратное ускорение · медитативный возврат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            cursor: none;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            position: fixed;
            top: 0;
            left: 0;
        }
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: none;
        }
    </style>
</head>
<body>
    <canvas id="vortex"></canvas>
    <script>
        const canvas = document.getElementById('vortex');
        const ctx = canvas.getContext('2d');

        let W, H, COLS, ROWS, TOTAL;
        let homeX, homeY, posX, posY, velX, velY, hue;
        let mx, my;
        let mouseDown = false;
        let mouseOn = false;

        const GAP = 3;

        // Палитра — ярче на 25%
        const paletteSize = 1024;
        const palette = new Uint8Array(paletteSize * 3);

        (function buildPalette() {
            const stops = [
                { pos: 0.00, h: 250, s: 0.85, v: 1.0 },
                { pos: 0.12, h: 265, s: 0.80, v: 1.0 },
                { pos: 0.25, h: 290, s: 0.75, v: 1.0 },
                { pos: 0.38, h: 330, s: 0.70, v: 1.0 },
                { pos: 0.50, h: 5,   s: 0.80, v: 1.0 },
                { pos: 0.62, h: 30,  s: 0.85, v: 1.0 },
                { pos: 0.75, h: 160, s: 0.75, v: 1.0 },
                { pos: 0.88, h: 195, s: 0.80, v: 1.0 },
                { pos: 1.00, h: 225, s: 0.85, v: 1.0 },
            ];

            function hsvToRgb(h, s, v) {
                h = ((h % 360) + 360) % 360;
                const c = v * s;
                const x = c * (1 - Math.abs((h / 60) % 2 - 1));
                const m = v - c;
                let rr, gg, bb;
                if (h < 60)      [rr, gg, bb] = [c, x, 0];
                else if (h < 120) [rr, gg, bb] = [x, c, 0];
                else if (h < 180) [rr, gg, bb] = [0, c, x];
                else if (h < 240) [rr, gg, bb] = [0, x, c];
                else if (h < 300) [rr, gg, bb] = [x, 0, c];
                else              [rr, gg, bb] = [c, 0, x];
                return [
                    Math.round((rr + m) * 255),
                    Math.round((gg + m) * 255),
                    Math.round((bb + m) * 255)
                ];
            }

            function lerpHsv(a, b, t) {
                let dh = b.h - a.h;
                if (dh > 180) dh -= 360;
                if (dh < -180) dh += 360;
                return {
                    h: a.h + dh * t,
                    s: a.s + (b.s - a.s) * t,
                    v: a.v + (b.v - a.v) * t,
                };
            }

            for (let i = 0; i < paletteSize; i++) {
                const t = i / (paletteSize - 1);
                let seg = 0;
                for (let s = 0; s < stops.length - 1; s++) {
                    if (t >= stops[s].pos && t <= stops[s + 1].pos) { seg = s; break; }
                }
                const a = stops[seg], bb = stops[seg + 1];
                const segT = (t - a.pos) / (bb.pos - a.pos);
                const hsv = lerpHsv(a, bb, segT);
                const [rr, gg, bb2] = hsvToRgb(hsv.h, hsv.s, hsv.v);
                const pi = i * 3;
                palette[pi] = rr;
                palette[pi + 1] = gg;
                palette[pi + 2] = bb2;
            }
        })();

        function getColor(t) {
            const idx = Math.min(paletteSize - 1, Math.max(0, Math.floor(t * (paletteSize - 1))));
            const i = idx * 3;
            return [palette[i], palette[i + 1], palette[i + 2]];
        }

        function init() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;
            canvas.style.width = W + 'px';
            canvas.style.height = H + 'px';
            ctx.setTransform(1, 0, 0, 1, 0, 0);

            COLS = Math.floor(W / GAP);
            ROWS = Math.floor(H / GAP);
            TOTAL = COLS * ROWS;

            mx = W / 2;
            my = H / 2;

            homeX = new Float32Array(TOTAL);
            homeY = new Float32Array(TOTAL);
            posX = new Float32Array(TOTAL);
            posY = new Float32Array(TOTAL);
            velX = new Float32Array(TOTAL);
            velY = new Float32Array(TOTAL);
            hue = new Float32Array(TOTAL);

            const centerCol = (COLS - 1) / 2;
            const centerRow = (ROWS - 1) / 2;
            const maxDist = Math.sqrt(centerCol * centerCol + centerRow * centerRow);

            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const idx = row * COLS + col;
                    const hx = col * GAP;
                    const hy = row * GAP;
                    homeX[idx] = hx;
                    homeY[idx] = hy;
                    posX[idx] = hx;
                    posY[idx] = hy;
                    velX[idx] = 0;
                    velY[idx] = 0;

                    const dx = col - centerCol;
                    const dy = row - centerRow;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const distRatio = maxDist > 0 ? dist / maxDist : 0;
                    const proj = maxDist > 0 ? (dx * 0.7071 + dy * 0.7071) / maxDist : 0;
                    const k = 2.0 + distRatio * 4;
                    hue[idx] = 1 / (1 + Math.exp(-k * proj));
                }
            }
        }

        function update(dt) {
            const dt60 = Math.min(3, dt * 60);
            const SINGULARITY = 4;

            for (let i = 0; i < TOTAL; i++) {
                let fx = 0, fy = 0;
                const px = posX[i];
                const py = posY[i];

                if (mouseDown && mouseOn) {
                    const dxCenter = mx - px;
                    const dyCenter = my - py;
                    const distCenter = Math.sqrt(dxCenter * dxCenter + dyCenter * dyCenter);

                    if (distCenter < 0.2) {
                        posX[i] = mx; posY[i] = my;
                        velX[i] = 0; velY[i] = 0;
                        continue;
                    }

                    const nx = dxCenter / distCenter;
                    const ny = dyCenter / distCenter;

                    if (distCenter < SINGULARITY) {
                        posX[i] += (mx - px) * 0.5;
                        posY[i] += (my - py) * 0.5;
                        velX[i] = 0; velY[i] = 0;
                        continue;
                    }

                    const acceleration = 180 / (distCenter + 2);
                    fx += nx * acceleration;
                    fy += ny * acceleration;
                    fx += -ny * acceleration * 0.6;
                    fy += nx * acceleration * 0.6;

                    velX[i] = (velX[i] + fx * dt60) * 0.92;
                    velY[i] = (velY[i] + fy * dt60) * 0.92;

                    const speed = Math.sqrt(velX[i] * velX[i] + velY[i] * velY[i]);
                    if (speed > 25) {
                        velX[i] = velX[i] / speed * 25;
                        velY[i] = velY[i] / speed * 25;
                    }
                } else {
                    const dxHome = homeX[i] - px;
                    const dyHome = homeY[i] - py;
                    const distHome = Math.sqrt(dxHome * dxHome + dyHome * dyHome);

                    if (distHome < 0.15) {
                        posX[i] = homeX[i];
                        posY[i] = homeY[i];
                        velX[i] = 0;
                        velY[i] = 0;
                        continue;
                    }

                    const lerpFactor = 0.04 * dt60;
                    posX[i] = px + dxHome * lerpFactor;
                    posY[i] = py + dyHome * lerpFactor;
                    velX[i] = dxHome * lerpFactor;
                    velY[i] = dyHome * lerpFactor;
                    continue;
                }
            }

            if (mouseDown && mouseOn) {
                for (let i = 0; i < TOTAL; i++) {
                    posX[i] += velX[i] * dt60;
                    posY[i] += velY[i] * dt60;
                }
            }
        }

        function render() {
            const imgData = ctx.createImageData(W, H);
            const pixels = imgData.data;

            for (let i = 0; i < pixels.length; i += 4) {
                pixels[i] = 0;
                pixels[i+1] = 0;
                pixels[i+2] = 0;
                pixels[i+3] = 255;
            }

            const SINGULARITY = 4;

            for (let i = 0; i < TOTAL; i++) {
                const px = posX[i];
                const py = posY[i];
                const cx = Math.round(px);
                const cy = Math.round(py);

                if (cx < 0 || cx >= W || cy < 0 || cy >= H) continue;

                const dx = px - mx;
                const dy = py - my;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (mouseDown && dist < SINGULARITY) continue;

                const [r, g, b] = getColor(hue[i]);

                let brightness = 1.0;
                let finalR = r;
                let finalG = g;
                let finalB = b;

                if (mouseDown) {
                    brightness = Math.min(1.0, 1.5 / (dist * 0.02 + 0.3));
                    const blueshift = Math.max(0, 1.0 - dist / 300);
                    finalR = r * brightness * (1 - blueshift * 0.3);
                    finalG = g * brightness;
                    finalB = Math.min(255, b * brightness + blueshift * 60);
                }

                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        const sx = cx + dx;
                        const sy = cy + dy;
                        if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
                            const si = (sy * W + sx) * 4;
                            const d = Math.sqrt(dx * dx + dy * dy);
                            const br = d === 0 ? 1.0 : 0.35;
                            pixels[si] = Math.min(255, pixels[si] + finalR * br);
                            pixels[si+1] = Math.min(255, pixels[si+1] + finalG * br);
                            pixels[si+2] = Math.min(255, pixels[si+2] + finalB * br);
                            pixels[si+3] = 255;
                        }
                    }
                }
            }

            ctx.putImageData(imgData, 0, 0);
        }

        let lastTime = performance.now();
        let animFrame;

        function loop(timestamp) {
            const dt = Math.min(0.1, (timestamp - lastTime) / 1000);
            lastTime = timestamp;
            update(dt);
            render();
            animFrame = requestAnimationFrame(loop);
        }

        function getPos(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            if (e.changedTouches && e.changedTouches.length > 0) {
                return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function onDown(e) {
            e.preventDefault();
            const pos = getPos(e);
            mx = pos.x;
            my = pos.y;
            mouseDown = true;
            mouseOn = true;
        }

        function onMove(e) {
            e.preventDefault();
            if (!mouseDown) return;
            const pos = getPos(e);
            mx = pos.x;
            my = pos.y;
            mouseOn = true;
        }

        function onUp(e) {
            e.preventDefault();
            mouseDown = false;
        }

        canvas.addEventListener('mousedown', onDown);
        window.addEventListener('mousemove', function(e) {
            if (!mouseDown) {
                mx = e.clientX;
                my = e.clientY;
                mouseOn = true;
            } else {
                onMove(e);
            }
        });
        window.addEventListener('mouseup', onUp);
        canvas.addEventListener('mouseenter', function(e) {
            mx = e.clientX;
            my = e.clientY;
            mouseOn = true;
        });
        canvas.addEventListener('mouseleave', function() {
            mouseOn = false;
        });

        canvas.addEventListener('touchstart', onDown, { passive: false });
        canvas.addEventListener('touchmove', onMove, { passive: false });
        canvas.addEventListener('touchend', onUp, { passive: false });
        canvas.addEventListener('touchcancel', onUp, { passive: false });

        window.addEventListener('blur', function() {
            mouseDown = false;
        });

        window.addEventListener('resize', function() {
            cancelAnimationFrame(animFrame);
            init();
            lastTime = performance.now();
            animFrame = requestAnimationFrame(loop);
        });

        canvas.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        init();
        render();
        animFrame = requestAnimationFrame(loop);
    </script>
</body>
</html>
