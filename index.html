<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Квантовое поле — WebGL</title>
    <style>
        * { margin:0;padding:0;box-sizing:border-box; }
        html,body { width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;position:fixed;top:0;left:0;font-family:'Segoe UI',system-ui,sans-serif;cursor:none; }
        canvas { display:block;position:fixed;top:0;left:0;width:100%;height:100%;touch-action:none;z-index:1;cursor:none; }
        .hidden { display:none!important; }
        .cursor { position:fixed;pointer-events:none;z-index:100;width:12px;height:12px;border-radius:50%;background:rgba(0,0,0,0.9);border:2px solid rgba(255,255,255,0.5);box-shadow:0 0 8px rgba(0,0,0,0.8),0 0 4px rgba(255,255,255,0.3),inset 0 0 4px rgba(255,255,255,0.2);transform:translate(-50%,-50%);transition:width .15s,height .15s;display:none; }
        .cursor.active { width:18px;height:18px;border-color:rgba(255,255,255,0.8); }
        @media (hover: hover) and (pointer: fine) { .cursor { display: block; } }

        /* --- Новое меню --- */
        .ui-toggle{position:fixed;top:16px;right:16px;z-index:11;width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;pointer-events:auto;}
        .ui-toggle:hover{background:rgba(255,255,255,0.12);}
        .ui-toggle svg{width:16px;height:16px;stroke:rgba(255,255,255,0.6);fill:none;stroke-width:1.5;transition:transform .25s;}
        .menu.open .ui-toggle svg{transform:rotate(45deg);}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:8;opacity:0;pointer-events:none;transition:opacity .3s;}
        .panel{position:fixed;top:60px;right:16px;width:240px;max-height:calc(100vh - 76px);z-index:9;background:rgba(8,8,16,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 12px;overflow-y:auto;overflow-x:hidden;pointer-events:auto;touch-action:pan-y;-webkit-overflow-scrolling:touch;scrollbar-width:none;opacity:0;transform:translateY(-8px) scale(.97);transition:opacity .25s,transform .25s;pointer-events:none;}
        .panel::-webkit-scrollbar{display:none;}
        .menu.open .panel{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}

        /* Сегментный переключатель */
        .seg{display:flex;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);margin-bottom:14px;}
        .seg-btn{flex:1;padding:8px 0;text-align:center;color:rgba(255,255,255,0.4);font-size:11px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .25s;border:none;background:transparent;}
        .seg-btn.active{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.9);}

        /* Секции */
        .sec{margin-bottom:2px;border-bottom:1px solid rgba(255,255,255,0.04);}
        .sec-head{display:flex;align-items:center;justify-content:space-between;padding:10px 6px;cursor:pointer;border-radius:6px;transition:background .2s;user-select:none;}
        .sec-head:hover{background:rgba(255,255,255,0.05);}
        .sec-left{display:flex;align-items:center;gap:8px;}
        .sec-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
        .sec-icon svg{width:14px;height:14px;stroke:rgba(255,255,255,0.5);fill:none;stroke-width:1.5;}
        .sec-label{color:rgba(255,255,255,0.6);font-size:11px;font-weight:500;letter-spacing:.8px;text-transform:uppercase;}
        .sec-val{color:rgba(255,255,255,0.3);font-size:10px;margin-left:auto;margin-right:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;}
        .sec-arrow{color:rgba(255,255,255,0.25);font-size:8px;transition:transform .3s;flex-shrink:0;}
        .sec.open .sec-arrow{transform:rotate(180deg);}
        .sec-body{overflow:hidden;max-height:0;transition:max-height .3s ease;scrollbar-width:none;}
        .sec.open .sec-body{max-height:600px;overflow-y:auto;overflow-x:hidden;touch-action:pan-y;-webkit-overflow-scrolling:touch;}
        .sec-body::-webkit-scrollbar{display:none;}

        /* Список опций */
        .opts{display:flex;flex-direction:column;gap:1px;padding:4px 0 8px 0;}
        .opt{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:all .2s;border:1px solid transparent;}
        .opt:hover{background:rgba(255,255,255,0.04);}
        .opt.active{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15);}
        .opt-name{color:rgba(255,255,255,0.6);font-size:12px;font-weight:400;}
        .opt.active .opt-name{color:rgba(255,255,255,0.85);}
        .cat-title{color:rgba(255,255,255,0.25);font-size:9px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;padding:8px 10px 3px 10px;}
        .swatch{width:32px;height:14px;border-radius:4px;flex-shrink:0;}

        /* Настройки — слайдеры */
        .ctrl-row{display:flex;align-items:center;gap:8px;padding:6px 10px;}
        .ctrl-label{color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:.5px;text-transform:uppercase;min-width:60px;flex-shrink:0;}
        .ctrl-slider{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.12);outline:none;}
        .ctrl-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.8);cursor:pointer;box-shadow:0 0 4px rgba(0,0,0,0.5);}
        .ctrl-slider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.8);cursor:pointer;border:none;}
        .ctrl-btns{display:flex;gap:3px;margin-left:auto;}
        .ctrl-btn{width:28px;height:24px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
        .ctrl-btn.active{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.25);color:rgba(255,255,255,0.9);}

        /* Плеер */
        .player{padding:8px 0;border-top:1px solid rgba(255,255,255,0.04);margin-top:4px;}
        .player label{color:rgba(255,255,255,0.4);font-size:10px;letter-spacing:.8px;text-transform:uppercase;display:block;margin-bottom:6px;}
        .player-upload{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
        .player-upload-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:6px 12px;color:rgba(255,255,255,0.7);font-size:11px;cursor:pointer;transition:background .2s;flex-shrink:0;}
        .player-upload-btn:hover{background:rgba(255,255,255,0.14);}
        .player-fname{color:rgba(255,255,255,0.3);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;}
        .player-controls{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
        .player-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0;}
        .player-btn:hover{background:rgba(255,255,255,0.15);}
        .player-btn.playing{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);}
        .player-time{color:rgba(255,255,255,0.3);font-size:9px;font-variant-numeric:tabular-nums;flex-shrink:0;min-width:28px;}
        .player-vol{display:flex;align-items:center;gap:6px;}
        .player-vol-icon{color:rgba(255,255,255,0.35);font-size:11px;flex-shrink:0;}

        .mic-prompt{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:20;background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:24px;padding:8px 20px;color:rgba(255,255,255,0.7);font-size:12px;cursor:pointer;pointer-events:auto;display:none;letter-spacing:.5px;animation:pulse 2s infinite;}
        .mic-prompt.show{display:block;}
        @keyframes pulse{0%,100%{opacity:.8;}50%{opacity:1;}}
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <canvas id="glCanvas"></canvas>
    <canvas id="c2dCanvas" class="hidden"></canvas>
    <div class="menu" id="menu">
        <div class="overlay" id="overlay"></div>
        <button class="ui-toggle" id="menuToggle"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <div class="panel" id="sidePanel">
            <!-- Режим: Ручной / Музыка -->
            <div class="seg">
                <button class="seg-btn active" id="tbNormal">Ручной</button>
                <button class="seg-btn" id="tbMusic">Музыка</button>
            </div>
            <!-- Ручной: список режимов -->
            <div id="normalUI">
                <div class="sec" id="modeSection">
                    <div class="sec-head" id="modeHeader"><div class="sec-left"><div class="sec-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 4v4M12 16v4M4 12h4M16 12h4"/></svg></div><span class="sec-label">Режим</span></div><span class="sec-val" id="modeCurrent">Вихрь</span><span class="sec-arrow">▾</span></div>
                    <div class="sec-body"><div class="opts" id="modeList"></div></div>
                </div>
            </div>
            <!-- Музыка: список визуализаций -->
            <div id="musicUI" class="hidden">
                <div class="sec" id="musicModeSection">
                    <div class="sec-head" id="musicModeHeader"><div class="sec-left"><div class="sec-icon"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><span class="sec-label">Визуализация</span></div><span class="sec-val" id="musicModeCurrent">Свободный поток</span><span class="sec-arrow">▾</span></div>
                    <div class="sec-body"><div class="opts" id="musicModeList"></div></div>
                </div>
                <!-- Плеер -->
                <div class="player">
                    <label>Аудио</label>
                    <div class="player-upload"><div class="player-upload-btn" id="musicUploadBtn">Загрузить</div><span class="player-fname" id="musicFilename">не выбран</span><input type="file" id="musicFile" accept="audio/*" style="display:none"></div>
                    <div class="player-controls"><button class="player-btn" id="musicPlayBtn">▶</button><span class="player-time" id="musicTimeNow">0:00</span><input type="range" class="ctrl-slider" id="musicSeek" min="0" max="100" value="0" step="0.1"><span class="player-time" id="musicTimeDur">0:00</span></div>
                    <div class="player-vol"><span class="player-vol-icon">♪</span><input type="range" class="ctrl-slider" id="musicVol" min="0" max="100" value="70" step="1"></div>
                </div>
            </div>
            <!-- Палитра -->
            <div class="sec" id="paletteSection">
                <div class="sec-head" id="paletteHeader"><div class="sec-left"><div class="sec-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="8" r="1.5"/><circle cx="8" cy="13" r="1.5"/><circle cx="15" cy="14" r="1.5"/></svg></div><span class="sec-label">Палитра</span></div><span class="sec-val" id="paletteCurrent">4K UI</span><span class="sec-arrow">▾</span></div>
                <div class="sec-body"><div class="opts" id="paletteList"></div></div>
            </div>
            <!-- Настройки -->
            <div class="sec" id="settingsSection">
                <div class="sec-head" id="settingsHeader"><div class="sec-left"><div class="sec-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg></div><span class="sec-label">Настройки</span></div><span class="sec-arrow">▾</span></div>
                <div class="sec-body">
                    <div class="ctrl-row"><span class="ctrl-label">Вращение</span><div class="ctrl-btns"><button class="ctrl-btn active" id="dirCW"><svg viewBox="0 0 16 16" width="12" height="12" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M11 3l2 2-2 2"/><path d="M13 5H7a4 4 0 100 8h1"/></svg></button><button class="ctrl-btn" id="dirCCW"><svg viewBox="0 0 16 16" width="12" height="12" stroke="currentColor" fill="none" stroke-width="1.5"><path d="M5 3L3 5l2 2"/><path d="M3 5h6a4 4 0 110 8H8"/></svg></button></div></div>
                    <div class="ctrl-row"><span class="ctrl-label">Скорость</span><input type="range" class="ctrl-slider" id="speedSlider" min="0" max="200" value="100" step="1"></div>
                    <div class="ctrl-row"><span class="ctrl-label">Масштаб</span><input type="range" class="ctrl-slider" id="zoomSlider" min="30" max="100" value="100" step="1"></div>
                </div>
            </div>
        </div>
    </div>
    <button class="mic-prompt" id="micPrompt">Включить микрофон</button>

    <script>
    // --- Курсор ---
    const cursorEl=document.getElementById('cursor');
    if(window.matchMedia('(hover: hover) and (pointer: fine)').matches){
        document.addEventListener('mousemove',e=>{cursorEl.style.left=e.clientX+'px';cursorEl.style.top=e.clientY+'px';});
        document.addEventListener('mousedown',()=>cursorEl.classList.add('active'));
        document.addEventListener('mouseup',()=>cursorEl.classList.remove('active'));
    }
    // --- Меню ---
    const menu=document.getElementById('menu'),menuToggle=document.getElementById('menuToggle'),overlay=document.getElementById('overlay'),sidePanel=document.getElementById('sidePanel');
    let menuOpen=false;
    function onTap(el,fn){
        el.addEventListener('click',fn);
        el.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();fn(e);},{passive:false});
    }
    function toggleMenu(){menuOpen=!menuOpen;menu.classList.toggle('open',menuOpen);}
    onTap(menuToggle,e=>{e.stopPropagation();toggleMenu();});
    onTap(overlay,toggleMenu);
    sidePanel.addEventListener('click',e=>e.stopPropagation());
    sidePanel.addEventListener('mousedown',e=>e.stopPropagation());
    sidePanel.addEventListener('touchmove',e=>e.stopPropagation(),{passive:true});
    onTap(document.getElementById('paletteHeader'),e=>{e.stopPropagation();document.getElementById('paletteSection').classList.toggle('open');});
    onTap(document.getElementById('modeHeader'),e=>{e.stopPropagation();document.getElementById('modeSection').classList.toggle('open');});
    onTap(document.getElementById('musicModeHeader'),e=>{e.stopPropagation();document.getElementById('musicModeSection').classList.toggle('open');});
    onTap(document.getElementById('settingsHeader'),e=>{e.stopPropagation();document.getElementById('settingsSection').classList.toggle('open');});

    // --- Переключение Ручной / Музыка ---
    let isMusicView = false;
    let spinDirection = 1;
    let spinSpeed = 1;   // множитель скорости вращения
    let zoomLevel = 1;   // множитель масштаба
    const tbNormal=document.getElementById('tbNormal'),tbMusic=document.getElementById('tbMusic');
    const normalUI=document.getElementById('normalUI'),musicUI=document.getElementById('musicUI');

    function switchView(toMusic){
        isMusicView=toMusic;
        tbNormal.classList.toggle('active',!toMusic);
        tbMusic.classList.toggle('active',toMusic);
        if(toMusic){normalUI.classList.add('hidden');musicUI.classList.remove('hidden');currentMode='music_free';}
        else{musicUI.classList.add('hidden');normalUI.classList.remove('hidden');currentMode='vortex';document.getElementById('modeCurrent').textContent='Вихрь';}
        cancelAnimationFrame(animFrame);init();lastTime=performance.now();animFrame=requestAnimationFrame(loop);
    }
    onTap(tbNormal,e=>{e.stopPropagation();switchView(false);});
    onTap(tbMusic,e=>{e.stopPropagation();switchView(true);});

    // Направление вращения
    const dirCW=document.getElementById('dirCW'),dirCCW=document.getElementById('dirCCW');
    onTap(dirCW,e=>{e.stopPropagation();spinDirection=1;dirCW.classList.add('active');dirCCW.classList.remove('active');});
    onTap(dirCCW,e=>{e.stopPropagation();spinDirection=-1;dirCCW.classList.add('active');dirCW.classList.remove('active');});

    // Скорость вращения
    const speedSlider=document.getElementById('speedSlider');
    speedSlider.addEventListener('input',e=>{e.stopPropagation();spinSpeed=+speedSlider.value/100;});
    speedSlider.addEventListener('touchstart',e=>e.stopPropagation());

    // Масштаб (zoom)
    const zoomSlider=document.getElementById('zoomSlider');
    zoomSlider.addEventListener('input',e=>{e.stopPropagation();zoomLevel=+zoomSlider.value/100;});
    zoomSlider.addEventListener('touchstart',e=>e.stopPropagation());

    // --- Обычные режимы ---
    const visualModes=['fractal_mirror','parallax','sphere_depth','trails','echo','chromatic','glitch','double_exp','mandala_6','mandala_8','mandala_12','mandala_test','mandala_pulse'];
    const modeCategories=[
        {name:'Физические',modes:[{key:'vortex',name:'Вихрь',icon:'🌀'},{key:'blackhole',name:'Чёрная дыра',icon:'🕳️'},{key:'horizon',name:'Горизонт событий',icon:'⏳'},{key:'antigravity',name:'Антигравитация',icon:'💥'},{key:'gravlens',name:'Гравитационная линза',icon:'🔭'},{key:'magnetic',name:'Магнитное поле',icon:'🧲'},{key:'turbulence',name:'Турбулентность',icon:'💧'},{key:'electrostatic',name:'Электростатика',icon:'⚡'},{key:'pendulum',name:'Двойной маятник',icon:'⚖️'}]},
        {name:'Волновые',modes:[{key:'wave',name:'Волна',icon:'🌊'},{key:'moire',name:'Муар',icon:'🔮'},{key:'pulsar',name:'Пульсар',icon:'💫'},{key:'fabric',name:'Ткань',icon:'🧶'}]},
        {name:'Математические',modes:[{key:'fibonacci',name:'Спираль Фибоначчи',icon:'🐚'},{key:'lorenz',name:'Аттрактор Лоренца',icon:'🦋'},{key:'automaton',name:'Клеточный автомат',icon:'🧬'},{key:'reaction',name:'Реакция-диффузия',icon:'🧪'},{key:'fractal',name:'Фрактальная пыль',icon:'✳️'}]},
        {name:'Биологические',modes:[{key:'mycelium',name:'Мицелий',icon:'🍄'},{key:'plankton',name:'Планктон',icon:'🦠'},{key:'swarm',name:'Рой',icon:'🐝'},{key:'flock',name:'Стая птиц',icon:'🕊️'}]},
        {name:'Психоделические',modes:[{key:'kaleidoscope',name:'Калейдоскоп',icon:'🫧'},{key:'breathing',name:'Дыхание',icon:'👁️'},{key:'melting',name:'Плавление',icon:'🕰️'}]},
        {name:'Интерактивные',modes:[{key:'sound',name:'Реакция на звук',icon:'🎤'}]},
        {name:'Мандала',modes:[{key:'mandala_6',name:'Мандала 6',icon:'🔯'},{key:'mandala_8',name:'Мандала 8',icon:'✡️'},{key:'mandala_12',name:'Мандала 12',icon:'❄️'},{key:'mandala_test',name:'Мандала Тест',icon:'🧪'},{key:'mandala_pulse',name:'Мандала Пульс',icon:'💗'}]},
        {name:'Тестовые',modes:[{key:'fractal_mirror',name:'Фрактальное зеркало',icon:'🪞'},{key:'parallax',name:'Параллакс',icon:'🌐'},{key:'sphere_depth',name:'Сфера',icon:'🔮'},{key:'trails',name:'Кометные хвосты',icon:'🌠'},{key:'echo',name:'Эхо',icon:'👻'},{key:'chromatic',name:'Хроматическая аберрация',icon:'🌈'},{key:'glitch',name:'Глитч',icon:'⚡'},{key:'double_exp',name:'Двойная экспозиция',icon:'🔄'}]},
    ];
    let currentMode='vortex';
    function getPhysicsMode(){if(currentMode==='mandala_pulse')return'mandala_pulse';if(visualModes.includes(currentMode))return'vortex';if(currentMode.startsWith('music_'))return currentMode;return currentMode;}
    function buildModeList(){const list=document.getElementById('modeList');list.innerHTML='';modeCategories.forEach(cat=>{const t=document.createElement('div');t.className='cat-title';t.textContent=cat.name;list.appendChild(t);cat.modes.forEach(mode=>{const d=document.createElement('div');d.className='opt'+(mode.key===currentMode?' active':'');d.innerHTML='<span class="opt-name">'+mode.name+'</span>';onTap(d,function(e){e.stopPropagation();currentMode=mode.key;document.getElementById('modeCurrent').textContent=mode.name;updateMicPrompt();buildModeList();});list.appendChild(d);});});}
    buildModeList();

    // --- Музыкальные режимы ---
    const musicModes=[{key:'music_free',name:'Свободный поток',icon:'🌊'},{key:'music_mandala',name:'Мандала',icon:'🔮'},{key:'music_wave',name:'Волновой',icon:'📊'}];
    function buildMusicModeList(){const list=document.getElementById('musicModeList');list.innerHTML='';musicModes.forEach(mode=>{const d=document.createElement('div');d.className='opt'+(mode.key===currentMode?' active':'');d.innerHTML='<span class="opt-name">'+mode.name+'</span>';onTap(d,function(e){e.stopPropagation();currentMode=mode.key;document.getElementById('musicModeCurrent').textContent=mode.name;buildMusicModeList();});list.appendChild(d);});}
    buildMusicModeList();

    // --- Микрофон ---
    const micPrompt=document.getElementById('micPrompt');

    function getTotalForce(px,py,points,physMode){let totalFx=0,totalFy=0;const needAngle=physMode!=='vortex'&&physMode!=='blackhole'&&physMode!=='horizon'&&physMode!=='antigravity'&&physMode!=='breathing'&&physMode!=='melting'&&physMode!=='sound'&&!physMode.startsWith('music_');for(let p=0;p<points.length;p++){const pt=points[p],dx=pt.x-px,dy=pt.y-py,dist=Math.sqrt(dx*dx+dy*dy);if(dist<.2)continue;const nx=dx/dist,ny=dy/dist,strength=pt.strength||1;const angle=needAngle?Math.atan2(dy,dx):0;

        else if(physMode==='lorenz'){if(dist<.5)continue;const lx=px*.02-10,ly=py*.02-10,dxl=10*(ly-lx),dyl=lx*(28-(time*.001%60+20))-ly,len=Math.sqrt(dxl*dxl+dyl*dyl)+.01,f=4/(dist*.1+.5)*strength;totalFx+=dxl/len*f;totalFy+=dyl/len*f;}

        else if(physMode==='sound'){if(dist<.5)continue;const f=15/(dist*.08+.4)*strength;totalFx+=nx*f;totalFy+=ny*f;totalFx+=-ny*f*.5;totalFy+=nx*f*.5;}

    function update(dt){const dt60=Math.min(3,dt*60),physMode=getPhysicsMode();const isMusicMode=physMode.startsWith('music_');const isActive=touchPoints.length>0||mouseDown||(physMode==='sound'&&micActive&&getMicForce()>.02)||(isMusicMode&&musicPlaying);time+=dt*1000;if(isMusicMode&&musicPlaying)analyzeMusic();if(transitionProgress<1){transitionProgress=Math.min(1,transitionProgress+dt*3);if(transitionProgress>=1)currentStops=JSON.parse(JSON.stringify(targetStops));}let as;if(transitionProgress>=1)as=currentStops;else as=lerpStops(currentStops,targetStops,transitionProgress);const norm=normalizeStops(as);for(let i=0;i<9;i++){shaderH[i]=norm[i].h;shaderS[i]=norm[i].s;shaderV[i]=norm[i].v;}if(!useWebGL&&colorCache){for(let i=0;i<TOTAL;i++){const c=getPaletteColorCPU(hue[i],norm);colorCache[i*3]=c[0];colorCache[i*3+1]=c[1];colorCache[i*3+2]=c[2];}}

    if(isMusicMode&&musicPlaying&&musicBands.energy>.01){const cx=W/2,cy=H/2,e=musicBands.energy;points.push({x:cx,y:cy,strength:e*1.5});const orbitSpeed=time*.001*(1+musicBands.mid*3)*spinDirection;const orbitR=Math.min(W,H)*.25*(1+musicBands.bass*.5);for(let k=0;k<4;k++){const a=orbitSpeed+k*Math.PI/2;points.push({x:cx+Math.cos(a)*orbitR,y:cy+Math.sin(a)*orbitR,strength:e*.7});}}

    function drawDimQuad(d){gl.useProgram(quadProgram);gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);gl.bindBuffer(gl.ARRAY_BUFFER,quadBuf);gl.enableVertexAttribArray(aQuadPos);gl.vertexAttribPointer(aQuadPos,2,gl.FLOAT,false,0,0);gl.uniform1f(uDim,d);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);gl.disableVertexAttribArray(aQuadPos);}
    function drawParticles(positions,o){gl.useProgram(program);gl.uniform2f(uResolution,W,H);gl.uniform1fv(uStopH,shaderH);gl.uniform1fv(uStopS,shaderS);gl.uniform1fv(uStopV,shaderV);gl.uniform1f(uAlpha,o.alpha||1);gl.uniform3f(uColorMask,o.r!==undefined?o.r:1,o.g!==undefined?o.g:1,o.b!==undefined?o.b:1);gl.uniform1f(uRotation,o.rotation||0);gl.uniform1f(uScale,(o.scale||1)*zoomLevel);gl.uniform2f(uOffset,o.ox||0,o.oy||0);gl.uniform1f(uPointScale,(o.pointScale||1)*zoomLevel);gl.uniform1f(uSphereMode,o.sphereMode||0);gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE);gl.bindBuffer(gl.ARRAY_BUFFER,posBuffer);gl.bufferData(gl.ARRAY_BUFFER,positions,gl.DYNAMIC_DRAW);gl.enableVertexAttribArray(aPosition);gl.vertexAttribPointer(aPosition,2,gl.FLOAT,false,0,0);gl.bindBuffer(gl.ARRAY_BUFFER,hueBuffer);gl.enableVertexAttribArray(aHue);gl.vertexAttribPointer(aHue,1,gl.FLOAT,false,0,0);gl.drawArrays(gl.POINTS,0,TOTAL);}

    function renderGL(){for(let i=0;i<TOTAL;i++){glPositions[i*2]=posX[i];glPositions[i*2+1]=posY[i];}const mode=currentMode;
        if(mode==='trails'){if(hasPreserve)drawDimQuad(.08);else{gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);}drawParticles(glPositions,{});}
        else if(mode==='fractal_mirror'||mode==='music_mandala'||mode==='mandala_6'||mode==='mandala_8'||mode==='mandala_12'||mode==='mandala_test'||mode==='mandala_pulse'){gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);const sectors=mode==='music_mandala'?6:mode==='mandala_6'?6:mode==='mandala_8'?8:mode==='mandala_12'?12:mode==='mandala_test'?6:mode==='mandala_pulse'?6:5;const baseRot=(mode==='music_mandala'||mode.startsWith('mandala_'))?time*.0003*spinDirection*spinSpeed:0;for(let k=0;k<sectors;k++){const r=baseRot+k*Math.PI*2/sectors;const a=1-k*(1/(sectors+2));drawParticles(glPositions,{rotation:r,alpha:Math.max(.15,a),scale:mode==='fractal_mirror'?1-k*.15:1});}}

        else if(mode==='sphere_depth'){gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);drawParticles(glPositions,{sphereMode:1});}
        else if(mode==='echo'){gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);for(let e=0;e<ECHO_FRAMES;e++){const idx=((echoFrame-ECHO_FRAMES+e)%ECHO_FRAMES+ECHO_FRAMES)%ECHO_FRAMES;drawParticles(echoHistory[idx],{alpha:(e+1)/(ECHO_FRAMES+1)*.5,pointScale:.6+e*.1});}drawParticles(glPositions,{});}
        else if(mode==='chromatic'){gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);drawParticles(glPositions,{r:1,g:0,b:0,ox:-3,oy:-1.5,alpha:.9});drawParticles(glPositions,{r:0,g:1,b:0,ox:0,oy:1.5,alpha:.9});drawParticles(glPositions,{r:0,g:0,b:1,ox:3,oy:0,alpha:.9});}
        else if(mode==='glitch'){gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);drawParticles(glPositions,{});if(Math.random()<.15)drawParticles(glPositions,{ox:(Math.random()-.5)*30,r:1,g:0,b:.5,alpha:.4});if(Math.random()<.08)drawParticles(glPositions,{ox:(Math.random()-.5)*50,r:0,g:1,b:.5,alpha:.3});}
        else if(mode==='double_exp'){gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);const di=((echoFrame-ECHO_FRAMES)%ECHO_FRAMES+ECHO_FRAMES)%ECHO_FRAMES;drawParticles(echoHistory[di],{alpha:.5,scale:1.05,rotation:.02});drawParticles(glPositions,{});}
        else{gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);drawParticles(glPositions,{});}}
    function render2D(){if(!ctx2d)return;const imgData=ctx2d.createImageData(W,H),data=imgData.data;for(let i=0;i<TOTAL;i++){const px=posX[i]|0,py=posY[i]|0;if(px<0||px>=W||py<0||py>=H)continue;const r=colorCache[i*3],g=colorCache[i*3+1],b=colorCache[i*3+2];for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const sx=px+dx,sy=py+dy;if(sx<0||sx>=W||sy<0||sy>=H)continue;const w=Math.exp(-(dx*dx+dy*dy)*.8)*1.2,off=(sy*W+sx)*4;data[off]=Math.min(255,data[off]+r*w);data[off+1]=Math.min(255,data[off+1]+g*w);data[off+2]=Math.min(255,data[off+2]+b*w);data[off+3]=255;}}ctx2d.putImageData(imgData,0,0);}
    function render(){if(useWebGL&&gl&&!contextLost)renderGL();else render2D();}

    let lastTime=performance.now(),animFrame;
    function loop(ts){const dt=Math.min(.1,(ts-lastTime)/1000);lastTime=ts;update(dt);render();animFrame=requestAnimationFrame(loop);}
    window.addEventListener('resize',()=>{cancelAnimationFrame(animFrame);init();lastTime=performance.now();animFrame=requestAnimationFrame(loop);});
    const initNorm=normalizeStops(currentStops);for(let i=0;i<9;i++){shaderH[i]=initNorm[i].h;shaderS[i]=initNorm[i].s;shaderV[i]=initNorm[i].v;}
    if(useWebGL)initGPU();init();render();animFrame=requestAnimationFrame(loop);
    </script>
</body>
