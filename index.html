<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Квантовое поле — WebGL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden; background: #000;
            touch-action: none; -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; user-select: none;
            position: fixed; top: 0; left: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            cursor: none;
        }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; z-index: 1; cursor: none; }
        .cursor { position: fixed; pointer-events: none; z-index: 100; width: 12px; height: 12px; border-radius: 50%; background: rgba(0,0,0,0.9); border: 2px solid rgba(255,255,255,0.5); box-shadow: 0 0 8px rgba(0,0,0,0.8), 0 0 4px rgba(255,255,255,0.3), inset 0 0 4px rgba(255,255,255,0.2); transform: translate(-50%,-50%); transition: width 0.15s, height 0.15s; display: none; }
        .cursor.active { width: 18px; height: 18px; border-color: rgba(255,255,255,0.8); }
        @media (hover: hover) and (pointer: fine) { .cursor { display: block; } }
        .menu-toggle { position: fixed; top: 16px; right: 16px; z-index: 10; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.15); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; pointer-events: auto; }
        .menu-toggle:hover { background: rgba(255,255,255,0.15); }
        .menu-toggle svg { width: 20px; height: 20px; stroke: rgba(255,255,255,0.8); fill: none; stroke-width: 2; transition: transform 0.3s; }
        .menu.open .menu-toggle svg { transform: rotate(90deg); }
        .side-panel { position: fixed; top: 0; right: -320px; width: 280px; height: 100%; z-index: 9; background: rgba(10,10,20,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-left: 1px solid rgba(255,255,255,0.1); padding: 24px 20px; transition: right 0.4s cubic-bezier(0.22,0.61,0.36,1); overflow-y: auto; overflow-x: hidden; pointer-events: auto; touch-action: pan-y; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .side-panel::-webkit-scrollbar { display: none; }
        .menu.open .side-panel { right: 0; }
        .side-panel h3 { color: rgba(255,255,255,0.8); font-size: 14px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; margin-top: 8px; }
        .dropdown-section { margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 8px; }
        .dropdown-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 8px; cursor: pointer; border-radius: 8px; transition: background 0.2s; user-select: none; position: sticky; top: 0; background: rgba(10,10,20,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 2; }
        .dropdown-header:hover { background: rgba(255,255,255,0.08); }
        .dropdown-header-left { display: flex; align-items: center; gap: 10px; }
        .dropdown-header-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .dropdown-header-label { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
        .dropdown-header-current { color: rgba(255,255,255,0.4); font-size: 11px; margin-left: auto; margin-right: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
        .dropdown-arrow { color: rgba(255,255,255,0.4); font-size: 10px; transition: transform 0.3s; flex-shrink: 0; }
        .dropdown-section.open .dropdown-arrow { transform: rotate(180deg); }
        .dropdown-content { overflow: hidden; max-height: 0; transition: max-height 0.35s ease; scrollbar-width: none; }
        .dropdown-section.open .dropdown-content { max-height: 600px; overflow-y: auto; overflow-x: hidden; touch-action: pan-y; -webkit-overflow-scrolling: touch; }
        .dropdown-content::-webkit-scrollbar { display: none; }
        .option-list { display: flex; flex-direction: column; gap: 2px; padding: 4px 0 8px 0; }
        .option-item { display: flex; align-items: center; gap: 12px; padding: 9px 12px; border-radius: 10px; cursor: pointer; transition: all 0.2s; border: 1.5px solid transparent; }
        .option-item:hover { background: rgba(255,255,255,0.05); }
        .option-item.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
        .option-label { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 400; white-space: nowrap; }
        .option-icon { width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; background: rgba(255,255,255,0.08); }
        .option-item.active .option-icon { background: rgba(255,255,255,0.18); }
        .category-title { color: rgba(255,255,255,0.35); font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; padding: 10px 12px 4px 12px; }
        .palette-swatch { width: 36px; height: 18px; border-radius: 5px; flex-shrink: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 8; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .menu.open .overlay { opacity: 1; pointer-events: auto; }
        .mic-prompt { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 20; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 10px 24px; color: #fff; font-size: 14px; cursor: pointer; pointer-events: auto; display: none; letter-spacing: 1px; animation: pulse 2s infinite; }
        .mic-prompt.show { display: block; }
        @keyframes pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <canvas id="canvas"></canvas>
    <div class="menu" id="menu">
        <div class="overlay" id="overlay"></div>
        <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
        <div class="side-panel" id="sidePanel">
            <h3>Настройки</h3>
            <div class="dropdown-section" id="modeSection"><div class="dropdown-header" id="modeHeader"><div class="dropdown-header-left"><span class="dropdown-header-icon">🌀</span><span class="dropdown-header-label">Режим</span></div><span class="dropdown-header-current" id="modeCurrent">Вихрь</span><span class="dropdown-arrow">▼</span></div><div class="dropdown-content"><div class="option-list" id="modeList"></div></div></div>
            <div class="dropdown-section" id="paletteSection"><div class="dropdown-header" id="paletteHeader"><div class="dropdown-header-left"><span class="dropdown-header-icon">🎨</span><span class="dropdown-header-label">Палитра</span></div><span class="dropdown-header-current" id="paletteCurrent">4K UI</span><span class="dropdown-arrow">▼</span></div><div class="dropdown-content"><div class="option-list" id="paletteList"></div></div></div>
        </div>
    </div>
    <button class="mic-prompt" id="micPrompt">🎤 Включить микрофон</button>

    <script>
    // --- Курсор ---
    const cursorEl = document.getElementById('cursor');
    const isDesktop = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    if (isDesktop) {
        document.addEventListener('mousemove', e => { cursorEl.style.left = e.clientX+'px'; cursorEl.style.top = e.clientY+'px'; });
        document.addEventListener('mousedown', () => cursorEl.classList.add('active'));
        document.addEventListener('mouseup', () => cursorEl.classList.remove('active'));
    }

    // --- Меню ---
    const menu = document.getElementById('menu'), menuToggle = document.getElementById('menuToggle'), overlay = document.getElementById('overlay'), sidePanel = document.getElementById('sidePanel');
    let menuOpen = false;
    function toggleMenu() { menuOpen = !menuOpen; menu.classList.toggle('open', menuOpen); }
    menuToggle.addEventListener('click', e => { e.stopPropagation(); toggleMenu(); });
    overlay.addEventListener('click', toggleMenu);
    sidePanel.addEventListener('click', e => e.stopPropagation());
    sidePanel.addEventListener('touchmove', e => e.stopPropagation());
    sidePanel.addEventListener('touchstart', e => e.stopPropagation());
    document.getElementById('paletteHeader').addEventListener('click', e => { e.stopPropagation(); document.getElementById('paletteSection').classList.toggle('open'); });
    document.getElementById('modeHeader').addEventListener('click', e => { e.stopPropagation(); document.getElementById('modeSection').classList.toggle('open'); });

    // --- Все режимы ---
    const visualModes = ['fractal_mirror','parallax','sphere_depth','trails','echo','chromatic','glitch','double_exp'];
    const modeCategories = [
        { name: 'Физические', modes: [
            { key:'vortex',name:'Вихрь',icon:'🌀' },{ key:'blackhole',name:'Чёрная дыра',icon:'🕳️' },{ key:'horizon',name:'Горизонт событий',icon:'⏳' },{ key:'antigravity',name:'Антигравитация',icon:'💥' },{ key:'gravlens',name:'Гравитационная линза',icon:'🔭' },{ key:'magnetic',name:'Магнитное поле',icon:'🧲' },{ key:'turbulence',name:'Турбулентность',icon:'💧' },{ key:'electrostatic',name:'Электростатика',icon:'⚡' },{ key:'pendulum',name:'Двойной маятник',icon:'⚖️' },
        ]},
        { name: 'Волновые', modes: [
            { key:'wave',name:'Волна',icon:'🌊' },{ key:'moire',name:'Муар',icon:'🔮' },{ key:'pulsar',name:'Пульсар',icon:'💫' },{ key:'fabric',name:'Ткань',icon:'🧶' },
        ]},
        { name: 'Математические', modes: [
            { key:'fibonacci',name:'Спираль Фибоначчи',icon:'🐚' },{ key:'lorenz',name:'Аттрактор Лоренца',icon:'🦋' },{ key:'automaton',name:'Клеточный автомат',icon:'🧬' },{ key:'reaction',name:'Реакция-диффузия',icon:'🧪' },{ key:'fractal',name:'Фрактальная пыль',icon:'✳️' },
        ]},
        { name: 'Биологические', modes: [
            { key:'mycelium',name:'Мицелий',icon:'🍄' },{ key:'plankton',name:'Планктон',icon:'🦠' },{ key:'swarm',name:'Рой',icon:'🐝' },{ key:'flock',name:'Стая птиц',icon:'🕊️' },
        ]},
        { name: 'Психоделические', modes: [
            { key:'kaleidoscope',name:'Калейдоскоп',icon:'🫧' },{ key:'breathing',name:'Дыхание',icon:'👁️' },{ key:'melting',name:'Плавление',icon:'🕰️' },
        ]},
        { name: 'Интерактивные', modes: [
            { key:'sound',name:'Реакция на звук',icon:'🎤' },
        ]},
        { name: 'Тестовые', modes: [
            { key:'fractal_mirror',name:'Фрактальное зеркало',icon:'🪞' },
            { key:'parallax',name:'Параллакс',icon:'🌐' },
            { key:'sphere_depth',name:'Сфера',icon:'🔮' },
            { key:'trails',name:'Кометные хвосты',icon:'🌠' },
            { key:'echo',name:'Эхо',icon:'👻' },
            { key:'chromatic',name:'Хроматическая аберрация',icon:'🌈' },
            { key:'glitch',name:'Глитч',icon:'⚡' },
            { key:'double_exp',name:'Двойная экспозиция',icon:'🔄' },
        ]},
    ];
    let currentMode = 'vortex';

    function getPhysicsMode() { return visualModes.includes(currentMode) ? 'vortex' : currentMode; }

    function buildModeList() {
        const list = document.getElementById('modeList');
        list.innerHTML = '';
        modeCategories.forEach(cat => {
            const title = document.createElement('div'); title.className = 'category-title'; title.textContent = cat.name; list.appendChild(title);
            cat.modes.forEach(mode => {
                const div = document.createElement('div');
                div.className = 'option-item' + (mode.key === currentMode ? ' active' : '');
                div.innerHTML = '<div class="option-icon">'+mode.icon+'</div><span class="option-label">'+mode.name+'</span>';
                div.addEventListener('click', function(e) {
                    e.stopPropagation(); currentMode = mode.key;
                    document.getElementById('modeCurrent').textContent = mode.name;
                    updateMicPrompt(); buildModeList();
                });
                list.appendChild(div);
            });
        });
    }
    buildModeList();

    // --- Микрофон ---
    const micPrompt = document.getElementById('micPrompt');
    let audioCtx = null, analyser = null, micStream = null, frequencyData = null, micActive = false;
    async function enableMic() {
        if (micActive) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            const source = audioCtx.createMediaStreamSource(micStream);
            analyser = audioCtx.createAnalyser(); analyser.fftSize = 256; analyser.smoothingTimeConstant = 0.7;
            source.connect(analyser); frequencyData = new Uint8Array(analyser.frequencyBinCount);
            micActive = true; micPrompt.classList.remove('show');
            micPrompt.textContent = '🎤 Микрофон активен';
            setTimeout(() => { micPrompt.textContent = '🎤 Включить микрофон'; }, 1500);
        } catch (err) {
            micPrompt.textContent = '❌ Микрофон недоступен';
            setTimeout(() => { micPrompt.textContent = '🎤 Включить микрофон'; }, 2000);
        }
    }
    micPrompt.addEventListener('click', e => {
        e.stopPropagation();
        if (micActive) { if (micStream) micStream.getTracks().forEach(t => t.stop()); if (audioCtx) audioCtx.close(); audioCtx=null; analyser=null; micStream=null; micActive=false; micPrompt.textContent='🎤 Микрофон отключён'; setTimeout(()=>{micPrompt.textContent='🎤 Включить микрофон';},1500); }
        else enableMic();
    });
    function getMicForce() { if(!micActive||!analyser)return 0; analyser.getByteFrequencyData(frequencyData); let s=0; for(let i=0;i<frequencyData.length;i++)s+=frequencyData[i]; return s/(frequencyData.length*255); }
    function updateMicPrompt() { if(currentMode==='sound')micPrompt.classList.add('show'); else micPrompt.classList.remove('show'); }
    updateMicPrompt();

    // --- Палитры ---
    const palettes = {
        default:{name:'4K UI',swatch:'linear-gradient(to right,#4a47a3,#7b2cbf,#e63946,#f4a261,#2a9d8f,#48cae4,#3a5a9f)',stops:[{pos:0,h:250,s:.85,v:1},{pos:.12,h:265,s:.8,v:1},{pos:.25,h:290,s:.75,v:1},{pos:.38,h:330,s:.7,v:1},{pos:.5,h:5,s:.8,v:1},{pos:.62,h:30,s:.85,v:1},{pos:.75,h:160,s:.75,v:1},{pos:.88,h:195,s:.8,v:1},{pos:1,h:225,s:.85,v:1}]},
        ocean:{name:'Океан',swatch:'linear-gradient(to right,#00b4d8,#0077b6,#03045e)',stops:[{pos:0,h:195,s:.9,v:1},{pos:.25,h:200,s:.85,v:.95},{pos:.5,h:210,s:.9,v:.9},{pos:.75,h:220,s:.95,v:.85},{pos:1,h:235,s:1,v:.7}]},
        sunset:{name:'Закат',swatch:'linear-gradient(to right,#ff9f1c,#ff4d6d,#7209b7)',stops:[{pos:0,h:35,s:.9,v:1},{pos:.2,h:20,s:.85,v:1},{pos:.4,h:5,s:.8,v:.95},{pos:.6,h:340,s:.75,v:.9},{pos:.8,h:310,s:.8,v:.8},{pos:1,h:280,s:.85,v:.65}]},
        forest:{name:'Лес',swatch:'linear-gradient(to right,#a7c957,#386641,#1b4332)',stops:[{pos:0,h:80,s:.7,v:.9},{pos:.3,h:120,s:.65,v:.8},{pos:.55,h:150,s:.7,v:.7},{pos:.75,h:160,s:.6,v:.55},{pos:1,h:170,s:.5,v:.35}]},
        neon:{name:'Неон',swatch:'linear-gradient(to right,#f72585,#b5179e,#7209b7,#4cc9f0)',stops:[{pos:0,h:320,s:1,v:1},{pos:.25,h:290,s:1,v:1},{pos:.5,h:260,s:1,v:1},{pos:.75,h:195,s:1,v:1},{pos:1,h:170,s:1,v:1}]},
        fire:{name:'Огонь',swatch:'linear-gradient(to right,#ffea00,#ff9100,#d00000,#1a0000)',stops:[{pos:0,h:55,s:1,v:1},{pos:.25,h:40,s:1,v:1},{pos:.5,h:20,s:1,v:.95},{pos:.7,h:5,s:1,v:.85},{pos:.85,h:350,s:.9,v:.6},{pos:1,h:340,s:.8,v:.15}]},
        cosmic:{name:'Космос',swatch:'linear-gradient(to right,#e0aaff,#7b2cbf,#10002b)',stops:[{pos:0,h:280,s:.7,v:1},{pos:.3,h:270,s:.8,v:.9},{pos:.6,h:255,s:.9,v:.7},{pos:.85,h:245,s:.85,v:.4},{pos:1,h:240,s:.8,v:.1}]},
        midnight:{name:'Полночь',swatch:'linear-gradient(to right,#5c4d7d,#2c3e50,#0d1b2a)',stops:[{pos:0,h:240,s:.5,v:.7},{pos:.3,h:235,s:.6,v:.55},{pos:.6,h:225,s:.5,v:.4},{pos:.85,h:215,s:.4,v:.25},{pos:1,h:210,s:.3,v:.12}]},
        candy:{name:'Конфеты',swatch:'linear-gradient(to right,#ff99c8,#fcf6bd,#d0f4de,#a9def9,#e4c1f9)',stops:[{pos:0,h:345,s:.7,v:1},{pos:.2,h:50,s:.5,v:1},{pos:.4,h:80,s:.4,v:1},{pos:.6,h:160,s:.5,v:1},{pos:.8,h:200,s:.5,v:1},{pos:1,h:290,s:.5,v:1}]},
        mono:{name:'Монохром',swatch:'linear-gradient(to right,#fff,#888,#111)',stops:[{pos:0,h:0,s:0,v:1},{pos:.5,h:0,s:0,v:.5},{pos:1,h:0,s:0,v:.05}]},
        aurora:{name:'Северное сияние',swatch:'linear-gradient(to right,#06d6a0,#118ab2,#7209b7,#f72585)',stops:[{pos:0,h:160,s:.9,v:.9},{pos:.3,h:195,s:.85,v:.85},{pos:.6,h:270,s:.8,v:.8},{pos:.85,h:330,s:.75,v:.9},{pos:1,h:345,s:.8,v:1}]},
        desert:{name:'Пустыня',swatch:'linear-gradient(to right,#e9c46a,#e76f51,#c1121f,#780000)',stops:[{pos:0,h:45,s:.7,v:.95},{pos:.3,h:25,s:.8,v:.9},{pos:.6,h:10,s:.85,v:.8},{pos:.85,h:355,s:.9,v:.5},{pos:1,h:350,s:.85,v:.3}]},
        lavender:{name:'Лаванда',swatch:'linear-gradient(to right,#e0b1ff,#9d4edd,#3c096c)',stops:[{pos:0,h:280,s:.5,v:1},{pos:.35,h:275,s:.7,v:.85},{pos:.65,h:270,s:.8,v:.6},{pos:1,h:265,s:.9,v:.3}]},
        tropics:{name:'Тропики',swatch:'linear-gradient(to right,#a7c957,#ffca3a,#ff924c,#f65c78)',stops:[{pos:0,h:80,s:.7,v:.9},{pos:.3,h:50,s:.8,v:1},{pos:.6,h:25,s:.85,v:1},{pos:1,h:350,s:.75,v:.95}]},
        deepspace:{name:'Глубокий космос',swatch:'linear-gradient(to right,#000,#0b0b3b,#3a0ca3,#f0f0f0)',stops:[{pos:0,h:240,s:.5,v:.02},{pos:.3,h:240,s:.8,v:.25},{pos:.6,h:260,s:.9,v:.6},{pos:1,h:0,s:0,v:.95}]},
        watercolor:{name:'Акварель',swatch:'linear-gradient(to right,#ffc8dd,#ffd6a5,#b9fbc0,#a0c4ff)',stops:[{pos:0,h:345,s:.4,v:1},{pos:.3,h:35,s:.35,v:1},{pos:.6,h:140,s:.35,v:1},{pos:1,h:205,s:.4,v:1}]},
        metallic:{name:'Металлик',swatch:'linear-gradient(to right,#e0e0e0,#9e9e9e,#424242,#1a1a1a)',stops:[{pos:0,h:0,s:0,v:.9},{pos:.3,h:0,s:0,v:.65},{pos:.6,h:0,s:0,v:.35},{pos:1,h:0,s:0,v:.08}]},
        vintage:{name:'Винтаж',swatch:'linear-gradient(to right,#d4a373,#a3b18a,#588157,#6c757d)',stops:[{pos:0,h:35,s:.5,v:.85},{pos:.3,h:80,s:.3,v:.7},{pos:.6,h:120,s:.4,v:.55},{pos:1,h:210,s:.15,v:.5}]},
        cyberpunk:{name:'Киберпанк',swatch:'linear-gradient(to right,#f72585,#4cc9f0,#f7e600,#000)',stops:[{pos:0,h:330,s:.9,v:1},{pos:.3,h:195,s:.8,v:1},{pos:.6,h:55,s:1,v:1},{pos:1,h:0,s:0,v:0}]},
        mountain:{name:'Рассвет в горах',swatch:'linear-gradient(to right,#3c096c,#9d4edd,#ff6d6d,#ffca3a)',stops:[{pos:0,h:265,s:.9,v:.3},{pos:.3,h:275,s:.7,v:.6},{pos:.6,h:355,s:.7,v:.9},{pos:1,h:50,s:.8,v:1}]},
    };

    function init() {

    // --- Ввод ---
    let mouseDown=false,mousePos={x:0,y:0},touchPoints=[];

    // --- Физика ---
    let time = 0;
    const shaderH=new Float32Array(9),shaderS=new Float32Array(9),shaderV=new Float32Array(9);

    function getTotalForce(px,py,points,physMode) {
        let totalFx=0,totalFy=0;

            else if(physMode==='blackhole'){const f=200/(dist*dist+3)*strength;totalFx+=nx*f;totalFy+=ny*f;}
            else if(physMode==='horizon'){if(dist<8)continue;if(dist<18){const f=2/(dist-7)*strength;totalFx+=nx*f;totalFy+=ny*f;}else{const f=40/dist*strength;totalFx+=nx*f;totalFy+=ny*f;}}
            else if(physMode==='antigravity'){if(dist<.5)continue;const f=-300/(dist*dist+5)*strength;totalFx+=nx*f;totalFy+=ny*f;}
            else if(physMode==='wave'){if(dist<.5)continue;const f=15*Math.sin(dist*.3)/(dist*.1+1)*strength;totalFx+=Math.cos(angle)*f;totalFy+=Math.sin(angle)*f;}
            else if(physMode==='fibonacci'){if(dist<.5)continue;const sa=Math.log(dist+1)*1.618*2.4,f=8/(dist*.3+.5)*strength;totalFx+=Math.cos(angle+sa)*f;totalFy+=Math.sin(angle+sa)*f;totalFx+=Math.cos(angle+Math.PI/2)*f*.6;totalFy+=Math.sin(angle+Math.PI/2)*f*.6;}
            else if(physMode==='moire'){if(dist<.5)continue;const f1=Math.sin(dist*.15)*.5,f2=Math.cos(dist*.13+angle*3)*.5,f=(f1+f2)*12/(dist*.08+.5)*strength;totalFx+=Math.cos(angle)*f;totalFy+=Math.sin(angle)*f;const pf=Math.sin(dist*.1+angle*5)*6/(dist*.05+.5)*strength;totalFx+=Math.cos(angle+Math.PI/2)*pf;totalFy+=Math.sin(angle+Math.PI/2)*pf;}
            else if(physMode==='mycelium'){if(dist<.5)continue;const pulse=Math.sin(time*.002+dist*.1)*.5+.5,f=6/(dist*.15+.5)*(.6+pulse*.4)*strength;totalFx+=Math.cos(angle)*f;totalFy+=Math.sin(angle)*f;const bf=Math.sin(angle*3+time*.001)*3/(dist*.1+.5)*strength;totalFx+=Math.cos(angle+Math.PI/2)*bf;totalFy+=Math.sin(angle+Math.PI/2)*bf;}
            else if(physMode==='plankton'){if(dist<.5)continue;const drift=Math.sin(time*.003+px*.05)*Math.cos(time*.002+py*.05),f=(4/(dist*.2+.5)+drift*2)*strength;totalFx+=Math.cos(angle)*f;totalFy+=Math.sin(angle)*f;}
            else if(physMode==='swarm'){if(dist<.5)continue;const coh=5/(dist*.2+.5),sep=dist<20?-15/(dist*dist*.05+.5):0,ali=Math.sin(time*.001+angle*2)*3,f=(coh+sep+ali)*strength;totalFx+=Math.cos(angle)*f;totalFy+=Math.sin(angle)*f;}

    function update(dt) {
        const dt60=Math.min(3,dt*60);
        const physMode = getPhysicsMode();
        const isActive=touchPoints.length>0||mouseDown||(physMode==='sound'&&micActive&&getMicForce()>.02);
        time+=dt*1000;
        if(transitionProgress<1){transitionProgress=Math.min(1,transitionProgress+dt*3);if(transitionProgress>=1)currentStops=JSON.parse(JSON.stringify(targetStops));}
        let as; if(transitionProgress>=1)as=currentStops; else as=lerpStops(currentStops,targetStops,transitionProgress);
        const norm=normalizeStops(as); for(let i=0;i<9;i++){shaderH[i]=norm[i].h;shaderS[i]=norm[i].s;shaderV[i]=norm[i].v;}
        const points=[]; if(mouseDown)points.push(mousePos); for(let t=0;t<touchPoints.length;t++)points.push(touchPoints[t]);
        if(physMode==='sound'&&micActive){const mf=getMicForce();if(mf>.02){const cx=W/2,cy=H/2;points.push({x:cx,y:cy,strength:mf});points.push({x:cx*.5,y:cy*.5,strength:mf*.6});points.push({x:cx*1.5,y:cy*.5,strength:mf*.6});points.push({x:cx*.5,y:cy*1.5,strength:mf*.6});points.push({x:cx*1.5,y:cy*1.5,strength:mf*.6});}}

    // --- Рендер ---
    function drawDimQuad(dimAmount) {
        gl.useProgram(quadProgram);
        gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        gl.enableVertexAttribArray(aQuadPos);

        gl.uniform1f(uDim, dimAmount);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        gl.disableVertexAttribArray(aQuadPos);
    }

    function drawParticles(positions, opts) {
        gl.useProgram(program);
        gl.uniform2f(uResolution, W, H);
        gl.uniform1fv(uStopH, shaderH); gl.uniform1fv(uStopS, shaderS); gl.uniform1fv(uStopV, shaderV);

        gl.vertexAttribPointer(aHue, 1, gl.FLOAT, false, 0, 0);

    }

    function render() {
        for (let i=0;i<TOTAL;i++){glPositions[i*2]=posX[i];glPositions[i*2+1]=posY[i];}
        const mode = currentMode;

        if (mode === 'trails') {
            // Не очищаем — рисуем полупрозрачный чёрный квад
            drawDimQuad(0.08);
            drawParticles(glPositions, {});
        } else if (mode === 'fractal_mirror') {
            gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
            const layers = [{s:1,r:0,a:1},{s:.75,r:Math.PI*2/5,a:.6},{s:.55,r:Math.PI*4/5,a:.4},{s:.4,r:Math.PI*6/5,a:.25},{s:.28,r:Math.PI*8/5,a:.15}];
            for (const l of layers) drawParticles(glPositions, {scale:l.s, rotation:l.r, alpha:l.a});
        } else if (mode === 'parallax') {
            gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
            drawParticles(glPositions, {scale:.7, alpha:.25, pointScale:.7});
            drawParticles(glPositions, {scale:.85, alpha:.5, pointScale:.85});
            drawParticles(glPositions, {scale:1, alpha:1, pointScale:1});
        } else if (mode === 'sphere_depth') {
            gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
            drawParticles(glPositions, {sphereMode:1});
        } else if (mode === 'echo') {
            gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
            for (let e = 0; e < ECHO_FRAMES; e++) {
                const idx = ((echoFrame - ECHO_FRAMES + e) % ECHO_FRAMES + ECHO_FRAMES) % ECHO_FRAMES;
                const a = (e + 1) / (ECHO_FRAMES + 1) * 0.5;
                drawParticles(echoHistory[idx], {alpha:a, pointScale: 0.6 + e * 0.1});
            }
            drawParticles(glPositions, {alpha:1});
        } else if (mode === 'chromatic') {
            gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
            const spread = 3;
            drawParticles(glPositions, {r:1,g:0,b:0, ox:-spread, oy:-spread*0.5, alpha:.9});
            drawParticles(glPositions, {r:0,g:1,b:0, ox:0, oy:spread*0.5, alpha:.9});
            drawParticles(glPositions, {r:0,g:0,b:1, ox:spread, oy:0, alpha:.9});
        } else if (mode === 'glitch') {
            gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
            // Основной слой
            drawParticles(glPositions, {});
            // Глитч-слои — случайные горизонтальные смещения
            if (Math.random() < 0.15) {
                const ox = (Math.random() - 0.5) * 30;
                drawParticles(glPositions, {ox:ox, r:1, g:0, b:0.5, alpha:0.4});
            }
            if (Math.random() < 0.08) {
                const ox = (Math.random() - 0.5) * 50;
                drawParticles(glPositions, {ox:ox, r:0, g:1, b:0.5, alpha:0.3});
            }
        } else if (mode === 'double_exp') {
            gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
            const delayIdx = ((echoFrame - ECHO_FRAMES) % ECHO_FRAMES + ECHO_FRAMES) % ECHO_FRAMES;
            drawParticles(echoHistory[delayIdx], {alpha:.5, scale:1.05, rotation:0.02});
            drawParticles(glPositions, {alpha:1});
        } else {
            // Обычный рендер
            gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
            drawParticles(glPositions, {});
        }
    }

    let lastTime=performance.now(),animFrame;
    function loop(ts){const dt=Math.min(.1,(ts-lastTime)/1000);lastTime=ts;update(dt);render();animFrame=requestAnimationFrame(loop);}
    window.addEventListener('resize',()=>{cancelAnimationFrame(animFrame);init();lastTime=performance.now();animFrame=requestAnimationFrame(loop);});

    const initNorm=normalizeStops(currentStops); for(let i=0;i<9;i++){shaderH[i]=initNorm[i].h;shaderS[i]=initNorm[i].s;shaderV[i]=initNorm[i].v;}
    init(); render(); animFrame=requestAnimationFrame(loop);
    </script>
</body>
</html>
